<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TypingArena | Pro Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #06b6d4; --primary-dark: #0891b2; --bg-light: #f8fafc; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-light); color: #1e293b; overflow-x: hidden; min-height: 100vh; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        
        .glass-card { 
            background: rgba(255, 255, 255, 0.8); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.5); 
            box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.04); 
            border-radius: 24px; 
            transition: all 0.3s ease; 
        }

        .char { position: relative; display: inline-block; color: #94a3b8; font-size: 1.5rem; line-height: 1.6; white-space: pre; transition: color 0.1s; }
        @media (min-width: 768px) { .char { font-size: 1.85rem; } }
        
        .char.current { color: #0f172a; }
        .char.current::after { content: ''; position: absolute; left: 0; bottom: 2px; width: 100%; height: 3px; background: var(--primary); animation: blink 0.8s infinite; }
        .char.correct { color: var(--primary); }
        .char.incorrect { color: #ef4444; background: rgba(239, 68, 68, 0.1); border-radius: 4px; }
        
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .anim-slide { animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        .btn-fancy { 
            @apply bg-cyan-500 hover:bg-cyan-600 text-white font-black rounded-2xl transition-all active:scale-95 shadow-lg shadow-cyan-500/20 flex items-center justify-center gap-2 disabled:opacity-50;
        }

        .active-tab { @apply bg-white text-cyan-600 shadow-sm ring-1 ring-slate-200; }

        /* Mobile-friendly hidden input */
        #hidden-input { 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            opacity: 0; 
            pointer-events: none; 
            z-index: -1;
        }
    </style>
</head>
<body>

    <nav class="bg-white/70 backdrop-blur-md border-b border-slate-200/50 px-4 md:px-8 py-4 flex justify-between items-center sticky top-0 z-[50]">
        <div class="flex items-center gap-3 cursor-pointer group" onclick="app.switchView('lobby')">
            <div class="bg-cyan-500 p-2 rounded-xl text-white shadow-lg">
                <i data-lucide="keyboard" class="w-5 h-5 md:w-6 md:h-6"></i>
            </div>
            <span class="text-xl md:text-2xl font-extrabold tracking-tighter uppercase">Typing<span class="text-cyan-500">Arena</span></span>
        </div>
        <div class="flex items-center gap-3 md:gap-6">
            <div id="user-pill" class="hidden sm:flex items-center gap-3 bg-slate-100 px-4 py-1.5 rounded-full border border-slate-200">
                <div class="w-6 h-6 rounded-full bg-cyan-500 flex items-center justify-center text-[10px] text-white font-black" id="user-icon">?</div>
                <span id="user-name-nav" class="text-xs font-bold text-slate-600">Guest</span>
            </div>
            <button onclick="app.openSettings()" class="p-2 text-slate-400 hover:text-cyan-500 transition-colors">
                <i data-lucide="settings" class="w-5 h-5"></i>
            </button>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-8 md:py-12 max-w-5xl">
        
        <!-- View: Lobby -->
        <section id="view-lobby" class="max-w-xl mx-auto space-y-8 md:space-y-10 anim-slide">
            <div class="text-center space-y-4">
                <h1 class="text-4xl md:text-5xl font-black text-slate-900 leading-tight">Master your <br class="hidden md:block"/><span class="text-cyan-500">Typing Skills.</span></h1>
                <p class="text-slate-400 font-medium px-4">Join your classroom arena and compete for the highest speed.</p>
            </div>

            <div class="glass-card p-6 md:p-10 space-y-6">
                <div>
                    <label class="text-[10px] font-black uppercase text-slate-400 ml-1">Warrior Name</label>
                    <input type="text" id="input-name" placeholder="Enter full name" class="w-full bg-slate-50 border border-slate-200 p-4 rounded-2xl focus:ring-2 focus:ring-cyan-500 outline-none font-bold mt-1">
                </div>
                <div>
                    <label class="text-[10px] font-black uppercase text-slate-400 ml-1">Class ID (Optional)</label>
                    <input type="text" id="input-class" placeholder="Ex: CS-101" class="w-full bg-slate-50 border border-slate-200 p-4 rounded-2xl focus:ring-2 focus:ring-cyan-500 outline-none font-bold mt-1">
                </div>
                <div>
                    <label class="text-[10px] font-black uppercase text-slate-400 ml-1">Arena Category</label>
                    <select id="input-category" class="w-full bg-slate-50 border border-slate-200 p-4 rounded-2xl focus:ring-2 focus:ring-cyan-500 outline-none font-bold mt-1">
                        <option value="tech">Modern Tech</option>
                        <option value="cartoon">Cartoon History</option>
                        <option value="tmkoc">TMKOC Trivia</option>
                    </select>
                </div>
                <button onclick="app.joinArena()" class="w-full btn-fancy py-5 text-lg">Enter Arena <i data-lucide="zap" class="w-5 h-5"></i></button>
            </div>
        </section>

        <!-- View: Arena -->
        <section id="view-arena" class="hidden space-y-8 anim-slide">
            <div class="flex flex-col md:flex-row items-center justify-between gap-6">
                <div class="flex gap-2 p-1.5 bg-slate-200/50 rounded-2xl w-full md:w-auto overflow-x-auto">
                    <button class="time-btn flex-1 md:flex-none px-6 py-2 text-xs font-black rounded-xl text-slate-500 transition-all" onclick="app.setDuration(15, this)">15s</button>
                    <button class="time-btn flex-1 md:flex-none px-6 py-2 text-xs font-black rounded-xl text-slate-500 transition-all active-tab" onclick="app.setDuration(30, this)">30s</button>
                    <button class="time-btn flex-1 md:flex-none px-6 py-2 text-xs font-black rounded-xl text-slate-500 transition-all" onclick="app.setDuration(60, this)">60s</button>
                </div>
                <div class="flex items-center justify-between md:justify-end gap-6 md:gap-10 w-full md:w-auto">
                    <div class="text-center">
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">WPM</p>
                        <p class="text-2xl md:text-3xl font-black text-slate-800" id="stat-wpm">0</p>
                    </div>
                    <div class="text-center">
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Acc</p>
                        <p class="text-2xl md:text-3xl font-black text-slate-800"><span id="stat-acc">100</span>%</p>
                    </div>
                    <div class="bg-slate-900 text-white px-6 md:px-8 py-3 rounded-2xl shadow-xl min-w-[100px] text-center">
                        <p class="text-[10px] font-black uppercase opacity-60">Timer</p>
                        <p class="text-2xl md:text-3xl font-black mono" id="stat-time">30</p>
                    </div>
                </div>
            </div>

            <div id="arena-box" class="relative glass-card p-8 md:p-20 min-h-[300px] md:min-h-[350px] flex items-center justify-center cursor-text" onclick="app.focusArena()">
                <div id="text-display" class="mono select-none leading-relaxed text-center max-w-3xl"></div>
                <input type="text" id="hidden-input" autocomplete="off" spellcheck="false" inputmode="text">
                
                <div id="focus-needed" class="hidden absolute inset-0 bg-white/60 backdrop-blur-[2px] flex items-center justify-center rounded-3xl z-10">
                    <div class="bg-white px-6 py-3 rounded-full shadow-2xl border border-slate-100 flex items-center gap-3">
                        <span class="w-2 h-2 rounded-full bg-amber-500 animate-ping"></span>
                        <p class="text-sm font-black text-slate-700">Tap to start typing</p>
                    </div>
                </div>
            </div>

            <div class="flex justify-center">
                <button onclick="app.resetSession()" class="flex items-center gap-2 text-slate-400 hover:text-cyan-500 font-black text-[10px] md:text-xs uppercase transition-all">
                    <i data-lucide="refresh-cw" class="w-4 h-4"></i> Reset Arena (Esc)
                </button>
            </div>
        </section>

        <!-- View: Results -->
        <section id="view-results" class="hidden max-w-4xl mx-auto space-y-8 md:space-y-10 anim-slide">
            <div class="text-center space-y-2">
                <h2 class="text-3xl md:text-4xl font-black text-slate-900">Session Summary</h2>
                <p id="result-message" class="text-slate-500 font-bold"></p>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 md:gap-8">
                <div class="glass-card p-8 md:p-12 text-center space-y-2 border-cyan-100">
                    <p class="text-5xl md:text-6xl font-black text-cyan-600" id="res-wpm">0</p>
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Gross WPM</p>
                </div>
                <div class="glass-card p-8 md:p-12 text-center space-y-2 border-emerald-100">
                    <p class="text-5xl md:text-6xl font-black text-emerald-500" id="res-acc">0%</p>
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Precision</p>
                </div>
                <div class="glass-card p-8 md:p-12 text-center space-y-2 bg-slate-900 text-white">
                    <p class="text-5xl md:text-6xl font-black" id="res-net">0</p>
                    <p class="text-[10px] font-black uppercase opacity-50 tracking-widest">Net Score</p>
                </div>
            </div>
            <div class="flex flex-col md:flex-row justify-center gap-4 px-4">
                <button onclick="app.switchView('arena')" class="btn-fancy px-12 py-5 text-xl w-full md:w-auto">Try Again</button>
                <button onclick="app.switchView('lobby')" class="bg-white border-2 border-slate-200 px-12 py-5 rounded-2xl font-black text-slate-600 w-full md:w-auto">Main Menu</button>
            </div>
        </section>

    </main>

    <!-- Admin/Settings Modal -->
    <div id="modal-settings" class="hidden fixed inset-0 z-[150] backdrop-blur-md bg-slate-900/20 flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-[32px] p-6 md:p-10 space-y-8 relative shadow-2xl">
            <button onclick="app.closeSettings()" class="absolute top-6 right-6 text-slate-300 hover:text-slate-600"><i data-lucide="x" class="w-6 h-6"></i></button>
            <div class="flex items-center gap-4">
                <div class="p-3 bg-slate-100 rounded-2xl"><i data-lucide="shield-check" class="text-slate-600"></i></div>
                <h3 class="text-xl md:text-2xl font-black">Admin Console</h3>
            </div>
            
            <div id="admin-auth" class="space-y-4">
                <p class="text-sm font-bold text-slate-500">Enter Teacher PIN</p>
                <input type="password" id="admin-pin" placeholder="••••" maxlength="4" class="w-full bg-slate-50 border-2 p-5 rounded-2xl text-center text-3xl font-black tracking-[1em] focus:border-cyan-500 outline-none">
                <button onclick="app.loginAdmin()" class="w-full btn-fancy py-4">Access Dashboard</button>
            </div>

            <div id="admin-panel" class="hidden space-y-6">
                <button onclick="app.exportCSV()" class="w-full flex items-center justify-between p-4 bg-emerald-50 text-emerald-700 rounded-2xl font-bold hover:bg-emerald-100 transition-colors">
                    <span>Export All Records</span>
                    <i data-lucide="download" class="w-5 h-5"></i>
                </button>
                <div class="p-4 bg-slate-50 rounded-2xl">
                    <p class="text-[10px] font-black uppercase text-slate-400 mb-2">Total Submissions</p>
                    <p id="admin-count" class="text-2xl font-black text-slate-800">0</p>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const fbApp = initializeApp(firebaseConfig);
        const db = getFirestore(fbApp);
        const auth = getAuth(fbApp);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'typing-pro-v2-universal';

        const TEXTS = {
            tech: [
                "Artificial intelligence refers to the simulation of human intelligence by software and machines.",
                "Cloud computing allows users to access powerful server resources and storage over the internet instantly.",
                "Cybersecurity is the practice of protecting systems and networks from digital attacks and data theft."
            ],
            cartoon: [
                "Mickey Mouse made his first public appearance in the short film Steamboat Willie in nineteen twenty eight.",
                "The Flintstones was the first animated series to be broadcast in a prime time slot on American television.",
                "Tom and Jerry is an American animated media franchise and series of comedy short films created in nineteen forty."
            ],
            tmkoc: [
                "Jethalal Gada is the protagonist of the show and the owner of a popular shop called Gada Electronics.",
                "Gokuldham Society is known for its unity and the way residents celebrate every festival together like a family.",
                "Taarak Mehta is Jethalal's best friend and personal fire brigade who helps him out of every difficult situation."
            ]
        };

        window.app = {
            user: null,
            state: 'lobby',
            duration: 30,
            startTime: null,
            timer: null,
            input: '',
            target: '',
            records: [],

            init() {
                this.setupAuth();
                this.setupKeyboard();
                lucide.createIcons();
            },

            async setupAuth() {
                try {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                    onAuthStateChanged(auth, u => {
                        this.user = u;
                        if (u) this.listen();
                    });
                } catch (e) { console.error("Auth failed", e); }
            },

            listen() {
                const scoresCol = collection(db, 'artifacts', appId, 'public', 'data', 'scores');
                onSnapshot(scoresCol, (snap) => {
                    this.records = snap.docs.map(d => d.data());
                    document.getElementById('admin-count').innerText = this.records.length;
                }, (err) => console.error("Sync Error", err));
            },

            setupKeyboard() {
                const hidden = document.getElementById('hidden-input');
                hidden.addEventListener('input', (e) => {
                    this.input = e.target.value;
                    if (!this.startTime && this.input.length > 0) this.start();
                    this.renderChars();
                    if (this.input.length >= this.target.length) this.finish();
                });

                hidden.addEventListener('blur', () => {
                    if (this.state === 'arena') document.getElementById('focus-needed').classList.remove('hidden');
                });
                hidden.addEventListener('focus', () => {
                    document.getElementById('focus-needed').classList.add('hidden');
                });

                window.addEventListener('keydown', (e) => {
                    if (this.state === 'arena' && e.key === 'Escape') this.resetSession();
                    if (this.state === 'lobby' && e.key === 'Enter') this.joinArena();
                });
            },

            focusArena() {
                document.getElementById('hidden-input').focus();
            },

            switchView(view) {
                this.state = view;
                document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
                document.getElementById(`view-${view}`).classList.remove('hidden');
                if (view === 'arena') this.resetSession();
                lucide.createIcons();
            },

            joinArena() {
                const name = document.getElementById('input-name').value.trim();
                if (!name) return;
                
                this.userName = name;
                this.classId = document.getElementById('input-class').value || 'Open';
                this.category = document.getElementById('input-category').value;

                document.getElementById('user-pill').classList.remove('hidden');
                document.getElementById('user-name-nav').innerText = name;
                document.getElementById('user-icon').innerText = name[0].toUpperCase();

                this.switchView('arena');
            },

            setDuration(sec, btn) {
                this.duration = sec;
                document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active-tab'));
                btn.classList.add('active-tab');
                this.resetSession();
            },

            resetSession() {
                clearInterval(this.timer);
                this.startTime = null;
                this.input = '';
                document.getElementById('hidden-input').value = '';
                document.getElementById('stat-time').innerText = this.duration;
                document.getElementById('stat-wpm').innerText = '0';
                document.getElementById('stat-acc').innerText = '100';

                const pool = TEXTS[this.category] || TEXTS.tech;
                this.target = pool[Math.floor(Math.random() * pool.length)];
                
                this.renderChars();
                // Brief delay to allow mobile keyboard to settle
                setTimeout(() => this.focusArena(), 300);
            },

            renderChars() {
                const container = document.getElementById('text-display');
                container.innerHTML = this.target.split('').map((c, i) => {
                    let cls = 'char';
                    if (i < this.input.length) {
                        cls += this.input[i] === this.target[i] ? ' correct' : ' incorrect';
                    } else if (i === this.input.length) {
                        cls += ' current';
                    }
                    return `<span class="${cls}">${c}</span>`;
                }).join('');
            },

            start() {
                this.startTime = Date.now();
                this.timer = setInterval(() => {
                    const elapsed = (Date.now() - this.startTime) / 1000;
                    const remaining = Math.max(0, this.duration - Math.floor(elapsed));
                    document.getElementById('stat-time').innerText = remaining;
                    
                    const wpm = Math.round((this.input.length / 5) / (elapsed / 60)) || 0;
                    document.getElementById('stat-wpm').innerText = wpm;

                    if (remaining <= 0) this.finish();
                }, 1000);
            },

            async finish() {
                clearInterval(this.timer);
                const finalWpm = parseInt(document.getElementById('stat-wpm').innerText);
                let correct = 0;
                for(let i=0; i<this.input.length; i++) if(this.input[i] === this.target[i]) correct++;
                const finalAcc = Math.round((correct / Math.max(1, this.input.length)) * 100);
                const net = Math.round(finalWpm * (finalAcc/100));

                document.getElementById('res-wpm').innerText = finalWpm;
                document.getElementById('res-acc').innerText = finalAcc + "%";
                document.getElementById('res-net').innerText = net;
                document.getElementById('result-message').innerText = finalWpm > 40 ? "Excellent speed!" : "Keep practicing!";

                if (this.user && finalWpm > 2) {
                    try {
                        const scoresCol = collection(db, 'artifacts', appId, 'public', 'data', 'scores');
                        await addDoc(scoresCol, {
                            name: this.userName,
                            class: this.classId,
                            wpm: finalWpm,
                            acc: finalAcc,
                            net: net,
                            timestamp: new Date().toISOString()
                        });
                    } catch (e) { console.error("Save Error", e); }
                }

                this.switchView('results');
            },

            openSettings() { document.getElementById('modal-settings').classList.remove('hidden'); },
            closeSettings() { document.getElementById('modal-settings').classList.add('hidden'); },
            
            loginAdmin() {
                const pin = document.getElementById('admin-pin').value;
                if (pin === '1234') {
                    document.getElementById('admin-auth').classList.add('hidden');
                    document.getElementById('admin-panel').classList.remove('hidden');
                } else {
                    alert("Invalid PIN. Use 1234");
                }
            },

            exportCSV() {
                const headers = "Name,Class,WPM,Accuracy,Net,Date\n";
                const rows = this.records.map(r => `"${r.name}","${r.class}",${r.wpm},${r.acc},${r.net},"${r.timestamp}"`).join("\n");
                const blob = new Blob([headers + rows], { type: 'text/csv' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `typing_arena_results.csv`;
                a.click();
            }
        };

        app.init();
    </script>
</body>
</html>
